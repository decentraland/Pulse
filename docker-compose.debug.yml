services:
  dcl-pulse:
    build:
      context: .
      dockerfile: Dockerfile.debug
    container_name: dcl-pulse-debug
    ports:
      - "7777:7777/udp"
      - "7443:7443/udp"
    volumes:
      - ./src:/app/src
    environment:
      DOTNET_ENVIRONMENT: Development
      Logging__LogLevel__Default: Debug
      Peers__ResyncWithDelta: false
      WebTransport__Enabled: true
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
